name: Start OneBlock Server

permissions:
  contents: read

on:
  schedule:
    - cron: '0 9 * * *'     # 2:30 PM IST (09:00 UTC)
    - cron: '30 13 * * *'   # 7:00 PM IST (13:30 UTC)
  workflow_dispatch:

jobs:
  start-server:
    runs-on: ubuntu-latest
    steps:
    - name: Start OneBlock Server via SSH
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        echo "Current dir: $(pwd)"
        ls -l
        echo "Absolute path to scripts:"
        readlink -f ./scripts/oneblock.sh || echo "Not found"
        gh codespace ssh --codespace silver-space-barnacle-jjwp75v9xx77h5j9j -- bash -lc "./workspaces/idklolserverorsomething/scripts/oneblock.sh"