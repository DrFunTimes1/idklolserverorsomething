name: Start OneBlock Server

on:
  schedule:
    - cron: '0 9 * * *'     # 2:30 PM IST
    - cron: '30 13 * * *'   # 7:00 PM IST

jobs:
  start-server:
    runs-on: ubuntu-latest
    steps:
      - name: Start OneBlock Server via SSH
        run: |
          ssh user@your-server "tmux new -d -s mc '~/scripts/oneblock'"