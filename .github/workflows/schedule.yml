name: Start Codespace

on:
  schedule:
    - cron: '0 9 * * *'    # 2:30 PM IST
    - cron: '30 13 * * *'   # 07:00 PM IST
  workflow_dispatch:        # manual trigger

jobs:
  start-codespace:
    runs-on: ubuntu-latest
    steps:
      - name: Start Codespace via API
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CODESPACE_NAME: silver-space-barnacle-jjwp75v9xx77h5j9j
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/user/codespaces/$CODESPACE_NAME/start