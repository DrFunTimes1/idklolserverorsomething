name: Start Codespace

on:
  schedule:
    - cron: '0 9 * * *'      # 9:00 AM GMT
    - cron: '30 13 * * *'    # 13:30 PM GMT

jobs:
  start-codespace:
    runs-on: ubuntu-latest
    steps:
      - name: Start Codespace
        run: |
          curl -X POST \
          -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/user/codespaces/silver-space-barnacle-jjwp75v9xx77h5j9j/start