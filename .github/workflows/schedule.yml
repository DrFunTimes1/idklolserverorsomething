name: Start OneBlock Server

on:
  schedule:
    - cron: '0 9 * * *'     # 2:30 PM IST
    - cron: '30 13 * * *'   # 7:00 PM IST

jobs:
  start-server:
    runs-on: ubuntu-latest
    steps:
      - name: Start OneBlock Server via SSH
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh codespace start -c "silver-space-barnacle-jjwp75v9xx77h5j9j"
          sleep 10
          gh codespace ssh -c "silver-space-barnacle-jjwp75v9xx77h5j9j" --command "cd /workspaces/idklolserverorsomething/scripts && ./oneblock.sh"